# Pipeline Azure DevOps — RAG-TestKit
#
# Même stratégie que GitLab CI : tests unitaires systématiques,
# tests LLM en stage séparé conditionné à la branche main.

trigger:
  branches:
    include:
      - main
      - develop

pool:
  vmImage: 'ubuntu-latest'

stages:
  - stage: UnitTests
    displayName: 'Tests unitaires (rapides)'
    jobs:
      - job: unit
        steps:
          - task: UsePythonVersion@0
            inputs:
              versionSpec: '3.11'

          - script: |
              pip install --upgrade pip
              pip install -r requirements.txt
            displayName: 'Installation des dépendances'

          - script: |
              pytest tests/unit/ -m unit \
                --junitxml=reports/junit-unit.xml \
                --html=reports/unit-report.html --self-contained-html
            displayName: 'Exécution des tests unitaires'

          - task: PublishTestResults@2
            condition: always()
            inputs:
              testResultsFormat: 'JUnit'
              testResultsFiles: 'reports/junit-unit.xml'
              testRunTitle: 'Tests unitaires — Retriever'

          - task: PublishPipelineArtifact@1
            condition: always()
            inputs:
              targetPath: 'reports'
              artifact: 'rapports-tests-unitaires'

  - stage: LLMEvaluation
    displayName: 'Évaluation LLM (lente — main uniquement)'
    dependsOn: UnitTests
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - job: evaluation
        timeoutInMinutes: 120
        steps:
          - task: UsePythonVersion@0
            inputs:
              versionSpec: '3.11'

          - script: |
              pip install --upgrade pip
              pip install -r requirements.txt
            displayName: 'Installation des dépendances'

          - script: |
              pytest tests/evaluation/ tests/integration/ -m slow \
                --junitxml=reports/junit-eval.xml \
                --html=reports/eval-report.html --self-contained-html
            displayName: 'Tests évaluation IA (hallucination, sécurité)'
            env:
              HF_TOKEN: $(HF_TOKEN)  # variable secrète définie dans Azure DevOps

          - task: PublishTestResults@2
            condition: always()
            inputs:
              testResultsFormat: 'JUnit'
              testResultsFiles: 'reports/junit-eval.xml'
              testRunTitle: 'Évaluation IA — Hallucination & Sécurité'
