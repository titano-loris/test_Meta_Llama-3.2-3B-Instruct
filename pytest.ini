[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

markers =
    unit: tests unitaires rapides (pas de LLM)
    integration: tests d'intégration du pipeline complet (LLM chargé)
    evaluation: tests d'évaluation qualité IA (hallucination, fidélité)
    security: tests adversariaux et de sécurité
    slow: tests lents nécessitant le LLM (30-90s par requête sur CPU)
    requires_judge: tests nécessitant un LLM juge externe (DeepEval)

addopts =
    -v
    --tb=short
    --strict-markers

# Usage courant :
#   pytest -m unit                → tests rapides uniquement (~30s)
#   pytest -m "not slow"          → tout sauf les tests LLM
#   pytest -m security            → tests de sécurité uniquement
#   pytest --html=reports/report.html --self-contained-html   → rapport HTML
